spring:
  application:
    name: spring-redis

  # ── MySQL ─────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/spring_redis?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: redis
    password: redis
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Redis ─────────────────────────────────────────────
  data:
    redis:
      host: 127.0.0.1
      port: 6379
